services:
  jmoney_db:
    image: mysql/mysql-server:latest
    container_name: jmoney_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - jmoney_mysql:/var/lib/mysql

  jmoney_api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jmoney_api
    restart: always
    depends_on:
      jmoney_db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT}
    expose:
      - "5065"
    volumes:
      - ./server:/app
      - ./server/settings/settings.py:/app/settings/settings.py

  jmoney_web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: jmoney_web
    depends_on:
      - jmoney_api
    ports:
      - "3000:80"

volumes:
  jmoney_mysql:
    driver: local
