services:
  jmoney_db:
    image: mysql/mysql-server:latest
    container_name: jmoney_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - jmoney_mysql:/var/lib/mysql

  jmoney_api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jmoney_api
    restart: always
    depends_on:
      jmoney_db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT}
    expose:
      - "5065"
    volumes:
      - ./server:/app
      - ./server/settings/settings.py:/app/settings/settings.py

  jmoney_api_migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jmoney_api_migrate
    restart: "no"
    depends_on:
      jmoney_db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT}
    volumes:
      - ./server:/app
      - ./server/settings/settings.py:/app/settings/settings.py
    command: ["sh", "-lc", "python -c \"import os,socket,time,sys; host=os.getenv('DATABASE_HOST','jmoney_db'); port=int(os.getenv('DATABASE_PORT','3306')); timeout=int(os.getenv('DB_WAIT_TIMEOUT','60')); start=time.time();\n\nwhile True:\n    try:\n        s=socket.create_connection((host,port),timeout=2); s.close(); break\n    except OSError:\n        if time.time()-start>timeout: sys.exit('Timed out waiting for DB at %s:%s' % (host,port))\n        time.sleep(1)\" && flask db upgrade"]

  jmoney_api_make_migrations:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jmoney_api_make_migrations
    depends_on:
      jmoney_db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_NAME: ${DATABASE_NAME}
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT}
      MIGRATION_MESSAGE: ${MIGRATION_MESSAGE:-auto migration}
    volumes:
      - ./server:/app
      - ./server/settings/settings.py:/app/settings/settings.py
    command: ["sh", "-lc", "python -c \"import os,socket,time,sys; host=os.getenv('DATABASE_HOST','jmoney_db'); port=int(os.getenv('DATABASE_PORT','3306')); timeout=int(os.getenv('DB_WAIT_TIMEOUT','60')); start=time.time();\n\nwhile True:\n    try:\n        s=socket.create_connection((host,port),timeout=2); s.close(); break\n    except OSError:\n        if time.time()-start>timeout: sys.exit('Timed out waiting for DB at %s:%s' % (host,port))\n        time.sleep(1)\" && flask db migrate -m \"${MIGRATION_MESSAGE}\""]

  jmoney_web_dev:
    image: node:18
    container_name: jmoney_web_dev
    working_dir: /app
    depends_on:
      - jmoney_api
    ports:
      - "3001:3000"
    volumes:
      - ./web:/app
      - jmoney_web_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WDS_SOCKET_PORT: "3001"
    command: ["sh", "-lc", "npm install && npm start"]

volumes:
  jmoney_mysql:
    driver: local

  jmoney_web_node_modules:
    driver: local
